<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Deliveries</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">🌸 Islamabad Flowers</div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>
</header>

<h1>🚚 Delivery Management</h1>

<div class="container">
    <div class="two-column">

        <!-- Add Delivery Form -->
        <div class="form-container">
            <h2>Add New Delivery</h2>

            <form id="deliveryForm" method="POST">

                <label for="DeliveryID">Delivery ID</label>
                <input
                    type="number"
                    id="DeliveryID"
                    name="DeliveryID"
                    placeholder="Enter Delivery ID"
                    required
                >

                <label for="SupplierID">Supplier ID</label>
                <input
                    type="number"
                    id="SupplierID"
                    name="SupplierID"
                    placeholder="Enter Supplier ID"
                    required
                >

                <label for="DeliveryDate">Delivery Date</label>
                <input
                    type="date"
                    id="DeliveryDate"
                    name="DeliveryDate"
                    required
                >

                <button type="submit">
                    Add Delivery
                </button>

            </form>
        </div>

        <!-- Delivery List -->
        <div class="table-container">
            <h2>Delivery List</h2>
            <div id="deliveryList"></div>
        </div>

    </div>
</div>

<script>

    const API_URL =
    "https://flower-shop-production-a260.up.railway.app";

    document.addEventListener("DOMContentLoaded", () => {

        document.getElementById("deliveryForm").action =
        API_URL + "/delivery/add";

    });

    window.onload = () => {
        loadDeliveries();
    };

    function loadDeliveries() {

        fetch(`${API_URL}/delivery`)
        .then(response => response.json())
        .then(data => {

            const container =
            document.getElementById("deliveryList");

            if (data.length === 0) {

                container.innerHTML =
                '<p style="text-align:center;color:#999;">No deliveries added yet</p>';

                return;
            }

            let html =
            '<table><thead><tr><th>Delivery ID</th><th>Supplier ID</th><th>Delivery Date</th></tr></thead><tbody>';

            data.forEach(delivery => {

                html += `
                <tr>
                    <td>${delivery.DeliveryID}</td>
                    <td>${delivery.SupplierID}</td>
                    <td>${delivery.DeliveryDate}</td>
                </tr>`;
            });

            html += '</tbody></table>';

            container.innerHTML = html;
        })
        .catch(error => {

            console.error(error);

            document.getElementById("deliveryList").innerHTML =
            '<p class="error">Error loading deliveries</p>';
        });
    }

    document
    .querySelector("#deliveryForm")
    .addEventListener("submit", function(e) {

        e.preventDefault();

        this.submit();

        setTimeout(loadDeliveries, 500);
    });

</script>

</body>
</html>
