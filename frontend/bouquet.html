<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bouquets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">🌸 Islamabad Flowers</div>
            <a href="index.html" class="back-link">← Back to Home</a>
        </nav>
    </header>

    <h1>💐 Bouquet Management</h1>

    <div class="container">
        <div class="two-column">
            <!-- Add Bouquet Form -->
            <div class="form-container">
                <h2>Create New Bouquet</h2>
                <form action="http://localhost:3000/bouquet/add" method="POST">
                    <label for="BouquetID">Bouquet ID</label>
                    <input type="number" id="BouquetID" name="BouquetID" placeholder="Enter bouquet ID" required>

                    <label for="BouquetName">Bouquet Name</label>
                    <input type="text" id="BouquetName" name="BouquetName" placeholder="e.g., Romantic Red, Spring Garden" required>

                    <label for="RetailPrice">Retail Price ($)</label>
                    <input type="number" id="RetailPrice" name="RetailPrice" placeholder="Enter price" step="0.01" required>

                    <button type="submit">Create Bouquet</button>
                </form>
            </div>

            <!-- Bouquets List -->
            <div class="table-container">
                <h2>Bouquet List</h2>
                <div id="bouquetsList"></div>
            </div>
        </div>
    </div>

    <script>
        // Load bouquets on page load
        window.onload = () => {
            loadBouquets();
        };

        function loadBouquets() {
            fetch('http://localhost:3000/bouquet/')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('bouquetsList');
                    if (data.length === 0) {
                        container.innerHTML = '<p style="text-align: center; color: #999;">No bouquets created yet</p>';
                        return;
                    }
                    
                    let html = '<table><thead><tr><th>ID</th><th>Name</th><th>Price</th></tr></thead><tbody>';
                    data.forEach(bouquet => {
                        html += `<tr>
                            <td>${bouquet.BouquetID}</td>
                            <td>${bouquet.BouquetName}</td>
                            <td>$${bouquet.RetailPrice}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('bouquetsList').innerHTML = '<p class="error">Error loading bouquets</p>';
                });
        }

        // Reload bouquets after form submission
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            this.submit();
            setTimeout(loadBouquets, 500);
        });
    </script>
</body>
</html>
