<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">🌸 Islamabad Flowers</div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>
</header>

<h1>📊 Business Reports</h1>

<div class="container">

    <div class="table-container">
        <h2>Flower Inventory Report</h2>
        <div id="flowersReport"></div>
    </div>

    <div class="table-container">
        <h2>Suppliers Report</h2>
        <div id="suppliersReport"></div>
    </div>

    <div class="table-container">
        <h2>Bouquets Report</h2>
        <div id="bouquetsReport"></div>
    </div>

    <div class="table-container">
        <h2>Delivery Report</h2>
        <div id="deliveryReport"></div>
    </div>

    <div class="table-container">
        <h2>Delivery Detail Report</h2>
        <div id="deliveryDetailReport"></div>
    </div>

    <div class="table-container">
        <h2>Sales Summary</h2>
        <div id="salesReport"></div>
    </div>

</div>

<script>

const API_URL = "https://flower-shop-production-a260.up.railway.app";

window.onload = () => {
    loadFlowers();
    loadSuppliers();
    loadBouquets();
    loadDelivery();
    loadDeliveryDetail();
    loadSales();
};

// FLOWERS
function loadFlowers() {
    fetch(`${API_URL}/reports/flowers`)
    .then(res => res.json())
    .then(data => {
        let html = `<table><tr><th>ID</th><th>Name</th><th>Cost</th></tr>`;

        data.forEach(f => {
            html += `<tr>
                <td>${f.FlowerID}</td>
                <td>${f.CommonName}</td>
                <td>${f.CostPerStem}</td>
            </tr>`;
        });

        html += `</table>`;
        document.getElementById("flowersReport").innerHTML = html;
    });
}

// SUPPLIERS
function loadSuppliers() {
    fetch(`${API_URL}/reports/suppliers`)
    .then(res => res.json())
    .then(data => {
        let html = `<table><tr><th>ID</th><th>Name</th><th>Contact</th></tr>`;

        data.forEach(s => {
            html += `<tr>
                <td>${s.SupplierID}</td>
                <td>${s.SupplierName}</td>
                <td>${s.ContactNumber}</td>
            </tr>`;
        });

        html += `</table>`;
        document.getElementById("suppliersReport").innerHTML = html;
    });
}

// BOUQUETS
function loadBouquets() {
    fetch(`${API_URL}/reports/bouquets`)
    .then(res => res.json())
    .then(data => {
        let html = `<table><tr><th>ID</th><th>Name</th><th>Price</th></tr>`;

        data.forEach(b => {
            html += `<tr>
                <td>${b.BouquetID}</td>
                <td>${b.BouquetName}</td>
                <td>${b.RetailPrice}</td>
            </tr>`;
        });

        html += `</table>`;
        document.getElementById("bouquetsReport").innerHTML = html;
    });
}

// DELIVERY
function loadDelivery() {
    fetch(`${API_URL}/reports/delivery`)
    .then(res => res.json())
    .then(data => {
        let html = `<table><tr><th>ID</th><th>Supplier</th><th>Date</th></tr>`;

        data.forEach(d => {
            html += `<tr>
                <td>${d.DeliveryID}</td>
                <td>${d.SupplierName}</td>
                <td>${d.DeliveryDate}</td>
            </tr>`;
        });

        html += `</table>`;
        document.getElementById("deliveryReport").innerHTML = html;
    });
}

// DELIVERY DETAIL
function loadDeliveryDetail() {
    fetch(`${API_URL}/reports/delivery-detail`)
    .then(res => res.json())
    .then(data => {
        let html = `<table><tr>
            <th>Delivery</th>
            <th>Supplier</th>
            <th>Date</th>
            <th>Flower</th>
            <th>Qty</th>
            <th>Price</th>
        </tr>`;

        data.forEach(r => {
            html += `<tr>
                <td>${r.DeliveryID}</td>
                <td>${r.SupplierName}</td>
                <td>${r.DeliveryDate}</td>
                <td>${r.CommonName}</td>
                <td>${r.QuantityDelivered}</td>
                <td>${r.BulkPricePaid}</td>
            </tr>`;
        });

        html += `</table>`;
        document.getElementById("deliveryDetailReport").innerHTML = html;
    });
}

// SALES
function loadSales() {
    fetch(`${API_URL}/reports/sales`)
    .then(res => res.json())
    .then(data => {
        let html = `<table><tr><th>Bouquet</th><th>Total Flowers</th></tr>`;

        data.forEach(r => {
            html += `<tr>
                <td>${r.BouquetID}</td>
                <td>${r.TotalFlowers}</td>
            </tr>`;
        });

        html += `</table>`;
        document.getElementById("salesReport").innerHTML = html;
    });
}

</script>

</body>
</html>
